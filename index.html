<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do-List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="todo-container">
      <div class="input-section">
        <input type="text" id="input-task" placeholder="Add New Task" />
        <button id="btn-add">Add + +</button>
      </div>
      <hr />
      <!------------------------------ End For add, delete --------------->

      <div class="boxes">
        <div class="task">
          <h3 class="title-of-box">All Tasks</h3>
          <!--Title-->
          <div class="text" id="all-tasks"></div>
        </div>

        <div class="task">
          <h3 class="title-of-box">Completed</h3>
          <!--Title-->
          <div class="text" id="tasks-completed"></div>
        </div>

        <div class="task">
          <h3 class="title-of-box">Un Completed</h3>
          <!--Title-->
          <div class="text" id="tasks-uncompleted"></div>
        </div>
      </div>
    </div>
    <!-- Script -->
    <script src="main.js"></script>
  </body>
</html>
